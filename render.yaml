# ═══════════════════════════════════════════════════════════════════
# XSS Scout — Render.com Blueprint
# render.com → New → Blueprint → connect repo → Apply
# ═══════════════════════════════════════════════════════════════════

services:
  - type: web
    name: xss-scout
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: standard
    branch: main
    autoDeploy: true
    healthCheckPath: /health

    envVars:
      - key: PORT
        value: "10000"
      - key: HOST
        value: "0.0.0.0"
      - key: WORKERS
        value: "1"
      - key: LOG_LEVEL
        value: "info"
      - key: SCAN_WORKERS
        value: "20"
      - key: SCAN_EVIDENCE_DIR
        value: "/app/evidence"
      - key: SCAN_REPORTS_DIR
        value: "/app/reports"

    disk:
      name: xss-scout-data
      mountPath: /app/data
      sizeGB: 5
